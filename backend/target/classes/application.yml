spring:
  application:
    name: pcori-platform
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    default-encoding: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    enabled: false   # disabled by default; overridden in dev profile
  api-docs:
    enabled: false

app:
  jwt:
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  auth:
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
    lockout-duration-minutes: ${LOCKOUT_DURATION_MINUTES:30}
    password-reset-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:60}
