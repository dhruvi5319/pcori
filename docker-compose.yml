services:
  postgres:
    image: postgres:16-alpine
    container_name: pcori-postgres
    environment:
      POSTGRES_DB: pcori
      POSTGRES_USER: pcori
      POSTGRES_PASSWORD: pcori_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcori -d pcori"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: pcori-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pcori-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: pcori-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/pcori-files && mc anonymous set none local/pcori-files"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcori-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pcori
      SPRING_DATASOURCE_USERNAME: pcori
      SPRING_DATASOURCE_PASSWORD: pcori_dev
      JWT_SECRET: dev-secret-must-be-at-least-64-chars-long-for-hs512-algorithm-pcori
      JWT_EXPIRATION_MS: 3600000
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_DURATION_MINUTES: 30
      PASSWORD_RESET_TTL_MINUTES: 60
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: pcori-files
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
